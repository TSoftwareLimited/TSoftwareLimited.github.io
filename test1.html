<body>
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, memo } = React;

// --- All your existing components remain intact ---
// (CustomCursor, Magnetic, Toast, Spotlight, BackgroundBlobs, Reveal, Breadcrumbs, Footer, CircularScrollButton, LocationTime, Navigation, Preloader, HomePage, ProjectDetailPage, PlaygroundPage, ContactForm, etc.)

// --- Dark/Light Toggle Button ---
const DarkModeToggle = () => {
    const [theme, setTheme] = useState(() => document.documentElement.classList.contains('dark') ? 'dark' : 'light');

    const toggleTheme = () => {
        const root = document.documentElement;
        if (theme === 'dark') {
            root.classList.remove('dark');
            root.classList.add('light');
            setTheme('light');
        } else {
            root.classList.remove('light');
            root.classList.add('dark');
            setTheme('dark');
        }
    };

    return (
        <button onClick={toggleTheme} className="fixed top-8 right-8 z-50 p-3 rounded-full border border-white/20 backdrop-blur-md text-sm font-mono text-white hover:bg-white/10 transition-all duration-300">
            {theme === 'dark' ? 'Light Mode' : 'Dark Mode'}
        </button>
    );
};

// --- Main App ---
const App = () => {
    const [currentView, setCurrentView] = useState('home');
    const [selectedProject, setSelectedProject] = useState(null);
    const [isMenuOpen, setIsMenuOpen] = useState(false);
    const [toasts, setToasts] = useState([]);

    const addToast = (message, type='info') => setToasts(prev => [...prev, { message, type, id: Date.now() }]);
    const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

    const handleNavigate = (e, href) => {
        e.preventDefault();
        if (href === 'playground') {
            setCurrentView('playground');
        } else if (href === '#') {
            setCurrentView('home'); setSelectedProject(null);
        } else {
            document.querySelector(href)?.scrollIntoView({ behavior: 'smooth' });
        }
        setIsMenuOpen(false);
    };

    const handleProjectClick = (project, type) => {
        if(type === 'page') { setCurrentView('playground'); }
        else if(project) { setSelectedProject(project); setCurrentView('detail'); }
    };

    const handleBackHome = () => { setCurrentView('home'); setSelectedProject(null); }

    return (
        <>
            <BackgroundBlobs />
            <Spotlight />
            <CustomCursor />
            <Navigation currentView={currentView} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} onNavigate={handleNavigate} />
            <DarkModeToggle />

            {currentView === 'home' && <HomePage onProjectClick={handleProjectClick} addToast={addToast} />}
            {currentView === 'detail' && selectedProject && <ProjectDetailPage project={selectedProject} onBack={() => setCurrentView('playground')} onHome={handleBackHome} />}
            {currentView === 'playground' && <PlaygroundPage onBack={handleBackHome} onItemClick={handleProjectClick} />}

            {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={() => removeToast(t.id)} />)}
            <CircularScrollButton currentView={currentView} />
        </>
    );
};

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
