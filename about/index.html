<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Waliul Awal Taha - Creative Developer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1f1f1f', 900: '#171717', 950: '#0a0a0a' }
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'marquee': 'marquee 35s linear infinite',
                        'blob': 'blob 10s infinite',
                        'in': 'fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.05)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.95)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f8f8f8;
            --text-primary: #171717;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        .dark {
            --bg-color: #050505;
            --text-primary: #e5e5e5;
            --card-bg: rgba(10, 10, 10, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
            cursor: none;
        }
        
        ::selection { background: #6366f1; color: #ffffff; }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -10;
            background: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.08), transparent 25%), 
                radial-gradient(circle at 85% 30%, rgba(30, 64, 175, 0.08), transparent 25%);
        }

        .dark-card { background: var(--card-bg); border: 1px solid var(--border-color); backdrop-filter: blur(12px); }
        
        /* Hide cursor on mobile */
        @media (max-width: 768px) {
            body { cursor: auto; }
            .custom-cursor { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        // --- Icons ---
        const Icon = ({ path, size = 24, className = "", fill="none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={fill === "none" ? "currentColor" : "none"} strokeWidth={fill === "none" ? "2" : "0"} strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );

        const Icons = {
            Sun: (props) => <Icon {...props} path={<g><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></g>} />,
            Moon: (props) => <Icon {...props} path={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />} />,
            ArrowUpRight: (props) => <Icon {...props} path={<g><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" /></g>} />,
            Code2: (props) => <Icon {...props} path={<g><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></g>} />,
            Globe: (props) => <Icon {...props} path={<g><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></g>} />
        };

        // --- Helper Components ---
        const ThemeToggle = () => {
            const [isDark, setIsDark] = useState(true);
            useEffect(() => {
                const saved = localStorage.getItem('theme');
                if (saved === 'light') { setIsDark(false); document.documentElement.classList.remove('dark'); }
            }, []);
            const toggle = () => {
                setIsDark(!isDark);
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            };
            return (
                <button onClick={toggle} className="p-2.5 rounded-full border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-all">
                    {isDark ? <Icons.Sun size={18} className="text-yellow-400" /> : <Icons.Moon size={18} className="text-indigo-600" />}
                </button>
            );
        };

        const LocationTime = () => {
            const [time, setTime] = useState("");
            useEffect(() => {
                const tick = () => setTime(new Date().toLocaleTimeString('en-US', { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', hour12: true }));
                tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
            }, []);
            return (
                <div className="hidden md:flex items-center gap-2.5 px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 text-xs font-mono">
                    <Icons.Globe size={14} className="text-neutral-500" />
                    <span>Bangladesh <span className="font-bold">{time}</span></span>
                </div>
            );
        };

        // --- View Components ---
        const HomePage = ({ setView }) => (
            <div className="animate-in">
                <section className="mb-32">
                    <div className="inline-flex items-center gap-2 mb-6 text-green-500 font-mono text-xs uppercase tracking-widest">
                        <span className="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                        Available for hire
                    </div>
                    <h1 className="text-7xl md:text-[10rem] font-bold tracking-tighter leading-[0.8] mb-12">
                        CREATIVE<br />
                        <span className="text-neutral-300 dark:text-neutral-800 transition-colors">DEVELOPER.</span>
                    </h1>
                    <p className="max-w-xl text-xl text-neutral-500 leading-relaxed mb-10">
                        I build expressive digital experiences with motion, precision, and modern tech.
                    </p>
                    <button onClick={() => setView('about')} className="px-8 py-4 bg-black dark:bg-white text-white dark:text-black rounded-full font-bold hover:scale-105 transition-transform flex items-center gap-2">
                        About Me <Icons.ArrowUpRight size={18} />
                    </button>
                </section>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-20">
                    {[1, 2].map(i => (
                        <div key={i} className="dark-card p-12 rounded-3xl group cursor-pointer transition-all hover:-translate-y-2">
                            <Icons.Code2 size={40} className="text-indigo-500 mb-20" />
                            <h3 className="text-3xl font-bold mb-4">Project 0{i}</h3>
                            <p className="text-neutral-500">A showcase of technical excellence and interaction design.</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const AboutPage = () => (
            <div className="animate-in">
                <h1 className="text-6xl md:text-8xl font-bold tracking-tighter leading-[0.9] mb-12">
                    CRAFTING CODE<br /> 
                    <span className="text-neutral-300 dark:text-neutral-800 transition-colors">WITH PURPOSE.</span>
                </h1>
                <div className="grid md:grid-cols-2 gap-16 mb-24">
                    <p className="text-xl md:text-2xl text-neutral-500 leading-relaxed font-light">
                        I am a developer based in Bangladesh who believes that minimalism is the ultimate sophistication. By blending technical precision with aesthetic design, I help brands bridge the gap between imagination and reality.
                    </p>
                    <div className="grid grid-cols-2 gap-8">
                        <div>
                            <h4 className="text-xs font-mono uppercase text-neutral-400 mb-4">Skills</h4>
                            <ul className="text-lg font-medium space-y-2">
                                <li>React / Next.js</li>
                                <li>Node.js</li>
                                <li>Tailwind CSS</li>
                                <li>UI/UX Design</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="text-xs font-mono uppercase text-neutral-400 mb-4">Socials</h4>
                            <ul className="text-lg font-medium space-y-2">
                                <li>GitHub</li>
                                <li>LinkedIn</li>
                                <li>Twitter</li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div className="dark-card p-8 rounded-3xl mb-20">
                    <h3 className="text-2xl font-bold mb-4">Experience</h3>
                    <div className="space-y-6">
                        <div className="flex justify-between border-b border-black/5 dark:border-white/5 pb-4">
                            <span>Creative Developer — Freelance</span>
                            <span className="text-neutral-500">2024 - Present</span>
                        </div>
                        <div className="flex justify-between border-b border-black/5 dark:border-white/5 pb-4">
                            <span>Frontend Engineer — Tech Studio</span>
                            <span className="text-neutral-500">2023 - 2024</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- Main App ---
        const App = () => {
            const [view, setView] = useState('home');
            const [scrolled, setScrolled] = useState(false);
            const [cursorPos, setCursorPos] = useState({ x: -100, y: -100 });

            useEffect(() => {
                const onScroll = () => setScrolled(window.scrollY > 20);
                const onMove = (e) => setCursorPos({ x: e.clientX, y: e.clientY });
                window.addEventListener('scroll', onScroll);
                window.addEventListener('mousemove', onMove);
                return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('mousemove', onMove); };
            }, []);

            return (
                <div className="min-h-screen">
                    <div className="bg-mesh"></div>
                    
                    {/* Custom Cursor */}
                    <div className="custom-cursor fixed top-0 left-0 w-8 h-8 border border-neutral-400 rounded-full pointer-events-none z-[100] mix-blend-difference transition-transform duration-75 hidden md:block" style={{ transform: `translate3d(${cursorPos.x - 16}px, ${cursorPos.y - 16}px, 0)` }}></div>

                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 top-0 left-0 transition-all duration-500 ${scrolled ? 'py-4 bg-white/80 dark:bg-neutral-950/80 backdrop-blur-xl border-b border-black/5 dark:border-white/5' : 'py-6'}`}>
                        <div className="px-6 md:px-12 max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-8">
                                <button onClick={() => setView('home')} className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-black dark:bg-white rounded-lg flex items-center justify-center font-bold text-white dark:text-black">W</div>
                                    <span className="hidden sm:block font-mono text-sm tracking-widest text-neutral-500">CREATIVE DEV</span>
                                </button>
                                <div className="hidden md:flex gap-6">
                                    <button onClick={() => setView('home')} className={`text-sm font-medium ${view === 'home' ? 'text-indigo-500' : 'text-neutral-500'}`}>Work</button>
                                    <button onClick={() => setView('about')} className={`text-sm font-medium ${view === 'about' ? 'text-indigo-500' : 'text-neutral-500'}`}>About</button>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <LocationTime />
                                <ThemeToggle />
                            </div>
                        </div>
                    </nav>

                    <main className="pt-40 px-6 md:px-12 max-w-7xl mx-auto min-h-screen">
                        {view === 'home' ? <HomePage setView={setView} /> : <AboutPage />}
                    </main>

                    <footer className="py-20 border-t border-black/5 dark:border-white/5 text-center text-neutral-500 text-sm">
                        <p>&copy; {new Date().getFullYear()} Waliul Awal Taha. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
