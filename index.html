<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; connect-src 'self' https://formspree.io; media-src 'self' https:;">

    <title>Waliul Awal Taha - Creative Developer</title>
    <meta name="description" content="Creative Developer building expressive digital experiences. React, Node.js, and Design.">
    <meta name="author" content="Waliul Awal Taha">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        neutral: { 850: '#1f1f1f', 900: '#171717', 950: '#0a0a0a' }
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'marquee': 'marquee 35s linear infinite',
                        'blob': 'blob 10s infinite',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
                        marquee: { '0%': { transform: 'translateX(0)' }, '100%': { transform: 'translateX(-50%)' } },
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.05)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.95)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f8f8f8;
            --text-primary: #171717;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        .dark {
            --bg-color: #050505;
            --text-primary: #e5e5e5;
            --card-bg: rgba(10, 10, 10, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            cursor: none;
            transition: background-color 0.5s ease;
        }
        
        ::selection { background: #6366f1; color: #ffffff; }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -10;
            background: 
                radial-gradient(circle at 15% 50%, rgba(76, 29, 149, 0.08), transparent 25%), 
                radial-gradient(circle at 85% 30%, rgba(30, 64, 175, 0.08), transparent 25%);
        }

        /* Custom overrides to support light mode transparency */
        .dark-card { background: var(--card-bg); border: 1px solid var(--border-color); backdrop-filter: blur(12px); }
        .text-adaptive { color: var(--text-primary); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, memo } = React;

        // --- Icons ---
        const Icon = ({ path, size = 24, className = "", fill="none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={fill === "none" ? "currentColor" : "none"} strokeWidth={fill === "none" ? "2" : "0"} strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );

        const Icons = {
            Sun: (props) => <Icon {...props} path={<g><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></g>} />,
            Moon: (props) => <Icon {...props} path={<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />} />,
            ArrowUpRight: (props) => <Icon {...props} path={<g><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" /></g>} />,
            Code2: (props) => <Icon {...props} path={<g><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></g>} />,
            Github: (props) => <Icon {...props} path={<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />} />,
            Globe: (props) => <Icon {...props} path={<g><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></g>} />,
            Send: (props) => <Icon {...props} path={<g><line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" /></g>} />,
            RefreshCcw: (props) => <Icon {...props} path={<g><path d="M23 4v6h-6" /><path d="M1 20v-6h6" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></g>} />,
            ChevronRight: (props) => <Icon {...props} path={<polyline points="9 18 15 12 9 6" />} />
        };

        const personalInfo = {
            name: "Waliul Awal Taha",
            role: "Creative Developer",
            socials: { github: "https://github.com/waliulawaltaha", linkedin: "https://www.linkedin.com/in/waliulawaltaha" }
        };

        // --- Components ---

        const ThemeToggle = () => {
            const [isDark, setIsDark] = useState(true);

            useEffect(() => {
                const saved = localStorage.getItem('theme');
                if (saved === 'light') {
                    setIsDark(false);
                    document.documentElement.classList.remove('dark');
                }
            }, []);

            const toggle = () => {
                const newMode = !isDark;
                setIsDark(newMode);
                if (newMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            };

            return (
                <button 
                    onClick={toggle} 
                    className="p-2.5 rounded-full border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-all duration-300 group"
                    aria-label="Toggle Theme"
                >
                    {isDark ? <Icons.Sun size={18} className="text-yellow-400 group-hover:rotate-45 transition-transform" /> : <Icons.Moon size={18} className="text-indigo-600" />}
                </button>
            );
        };

        const Magnetic = ({ children }) => {
            const ref = useRef(null);
            const [position, setPosition] = useState({x:0, y:0});
            const handleMouse = (e) => {
                const { clientX, clientY } = e;
                const { height, width, left, top } = ref.current.getBoundingClientRect();
                setPosition({ x: (clientX - (left + width/2)) * 0.2, y: (clientY - (top + height/2)) * 0.2 });
            }
            const reset = () => setPosition({x:0, y:0});
            return (
                <div ref={ref} onMouseMove={handleMouse} onMouseLeave={reset} style={{transform: `translate3d(${position.x}px, ${position.y}px, 0)`, transition: 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)'}} className="inline-block">
                    {children}
                </div>
            )
        };

        const LocationTime = () => {
            const [time, setTime] = useState("");
            useEffect(() => {
                const interval = setInterval(() => {
                    setTime(new Date().toLocaleTimeString('en-US', { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', hour12: true }));
                }, 1000);
                return () => clearInterval(interval);
            }, []);
            return (
                <div className="flex items-center gap-2.5 px-4 py-1.5 rounded-full border border-black/10 dark:border-white/10 bg-black/5 dark:bg-white/5 text-xs font-mono text-neutral-500 dark:text-neutral-400">
                    <Icons.Globe size={14} className="animate-pulse" />
                    <span>Bangladesh <span className="text-black dark:text-white font-medium">{time}</span></span>
                </div>
            );
        };

        const Navigation = memo(({ onNavigate, scrolled }) => {
            return (
                <nav className={`fixed w-full z-50 top-0 left-0 transition-all duration-500 ${scrolled ? 'py-4 bg-white/80 dark:bg-neutral-950/80 backdrop-blur-xl border-b border-black/5 dark:border-white/5' : 'py-6'}`}>
                    <div className="px-6 md:px-12 max-w-7xl mx-auto flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-black dark:bg-white rounded-lg flex items-center justify-center p-1.5">
                                <span className="text-white dark:text-black font-bold">W</span>
                            </div>
                            <span className="hidden sm:block font-mono text-sm tracking-widest uppercase text-neutral-500">Creative Dev</span>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <LocationTime />
                            <ThemeToggle />
                            <div className="hidden md:flex gap-1 p-1 rounded-full border border-black/5 dark:border-white/5 bg-black/5 dark:bg-white/5">
                                {['Work', 'Playground', 'Contact'].map(item => (
                                    <button key={item} className="px-5 py-2 rounded-full text-sm font-medium hover:bg-white dark:hover:bg-neutral-800 transition-all">{item}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                </nav>
            );
        });

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                const handleMove = (e) => setCursorPos({ x: e.clientX, y: e.clientY });
                window.addEventListener('scroll', handleScroll);
                window.addEventListener('mousemove', handleMove);
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('mousemove', handleMove);
                };
            }, []);

            return (
                <div className="min-h-screen">
                    <div className="bg-mesh"></div>
                    
                    {/* Custom Cursor */}
                    <div className="fixed top-0 left-0 w-8 h-8 border border-neutral-400 rounded-full pointer-events-none z-[100] mix-blend-difference transition-transform duration-150 ease-out hidden md:block" style={{ transform: `translate3d(${cursorPos.x - 16}px, ${cursorPos.y - 16}px, 0)` }}></div>

                    <Navigation scrolled={scrolled} />

                    <main className="pt-40 px-6 md:px-12 max-w-7xl mx-auto">
                        <section className="mb-32">
                            <div className="inline-flex items-center gap-2 mb-6 text-green-500 font-mono text-xs uppercase tracking-widest">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                                Available for Projects
                            </div>
                            <h1 className="text-7xl md:text-[10rem] font-bold tracking-tighter leading-[0.8] mb-12">
                                CREATIVE<br />
                                <span className="text-neutral-300 dark:text-neutral-800 transition-colors">DEVELOPER.</span>
                            </h1>
                            <p className="max-w-xl text-xl text-neutral-500 leading-relaxed mb-10">
                                Hi, I'm <span className="text-black dark:text-white font-medium">{personalInfo.name}</span>. I build expressive digital experiences with motion, precision, and modern tech.
                            </p>
                            <div className="flex gap-4">
                                <button className="px-8 py-4 bg-black dark:bg-white text-white dark:text-black rounded-full font-bold hover:scale-105 transition-transform flex items-center gap-2">
                                    View Projects <Icons.ArrowUpRight size={18} />
                                </button>
                            </div>
                        </section>

                        <section className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-40">
                            {[1, 2].map(i => (
                                <div key={i} className="dark-card p-12 rounded-3xl group cursor-pointer transition-all duration-500 hover:-translate-y-2">
                                    <div className="flex justify-between items-start mb-20">
                                        <Icons.Code2 size={40} className="text-indigo-500" />
                                        <div className="opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icons.ArrowUpRight size={24} />
                                        </div>
                                    </div>
                                    <h3 className="text-3xl font-bold mb-4">Project {i}</h3>
                                    <p className="text-neutral-500">Focused on high-performance interaction and clean UI architecture.</p>
                                </div>
                            ))}
                        </section>
                    </main>

                    <footer className="py-20 border-t border-black/5 dark:border-white/5 text-center text-neutral-500 text-sm">
                        <p>&copy; {new Date().getFullYear()} {personalInfo.name}. Stay creative.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
