// --- Icons ---

    Github: (props) => <Icon {...props} path={<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />} />,

    RefreshCcw: (props) => <Icon {...props} path={<g><path d="M23 4v6h-6" /><path d="M1 20v-6h6" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></g>} />,

const personalInfo = {

// --- Visual Components ---
const CustomCursor = memo(() => { 
    const cursorRef = useRef(null); 
    const cursorDotRef = useRef(null); 
    
    useEffect(() => { 
        if (typeof window === 'undefined' || window.matchMedia("(pointer: coarse)").matches) return; 
        let rafId; 
        const moveCursor = (e) => { 
            cancelAnimationFrame(rafId); 
            rafId = requestAnimationFrame(() => { 
                if (cursorRef.current) cursorRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`; 
                if (cursorDotRef.current) cursorDotRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`; 
            }); 
        }; 
        window.addEventListener('mousemove', moveCursor, { passive: true }); 
        return () => { window.removeEventListener('mousemove', moveCursor); cancelAnimationFrame(rafId); }; 
    }, []); 
    
    return ( 
        <React.Fragment> 
            <div ref={cursorRef} className="custom-cursor fixed top-0 left-0 w-8 h-8 border border-white/30 rounded-full pointer-events-none z-[100] -ml-4 -mt-4 transition-transform duration-300 ease-expo mix-blend-difference will-change-transform hidden md:block"></div> 
            <div ref={cursorDotRef} className="custom-cursor fixed top-0 left-0 w-1.5 h-1.5 bg-white rounded-full pointer-events-none z-[100] -ml-[3px] -mt-[3px] mix-blend-difference will-change-transform hidden md:block transition-transform duration-75 ease-out"></div> 
        </React.Fragment> 
    ); 
});

const Magnetic = ({ children }) => { 
    const ref = useRef(null); 
    const [position, setPosition] = useState({x:0, y:0}); 
    const handleMouse = (e) => { 
        if (!ref.current) return; 
        const { clientX, clientY } = e; 
        const { height, width, left, top } = ref.current.getBoundingClientRect(); 
        const x = clientX - (left + width/2); 
        const y = clientY - (top + height/2); 
        setPosition({ x: x * 0.2, y: y * 0.2 }); 
    } 
    const reset = () => setPosition({x:0, y:0}); 
    
    return ( 
        <div ref={ref} onMouseMove={handleMouse} onMouseLeave={reset} style={{transform: `translate3d(${position.x}px, ${position.y}px, 0)`, transition: 'transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)', display: 'inline-block'}} className="will-change-transform"> 
            {children} 
        </div> 
    ) 
};

const Toast = ({ message, type, onClose }) => { 
    useEffect(() => { 
        const timer = setTimeout(onClose, 4000); 
        return () => clearTimeout(timer); 
    }, [onClose]); 
    
    return ( 
        <div className={`animate-in slide-in-from-bottom-5 fade-in duration-500 ease-expo min-w-[300px] p-4 rounded-xl border shadow-2xl flex items-center gap-3 ${type === 'success' ? 'bg-neutral-900 border-green-900/50' : 'bg-neutral-900 border-neutral-800'}`}> 
            <div className={`p-1.5 rounded-full ${type === 'success' ? 'bg-green-500/10' : 'bg-white/10'}`}> 
                {type === 'success' ? <Icons.Check size={16} className="text-green-500" /> : <Icons.Zap size={16} className="text-white" />} 
            </div> 
            <p className={`text-sm font-medium ${type === 'success' ? 'text-green-400' : 'text-white'}`}>{message}</p> 
        </div> 
    ); 
};

const Spotlight = memo(() => { 
    const ref = useRef(null); 
    useEffect(() => { 
        let rafId; 
        const handleMouseMove = (e) => { 
            cancelAnimationFrame(rafId); 
            rafId = requestAnimationFrame(() => { 
                if (ref.current) { ref.current.style.background = `radial-gradient(800px at ${e.clientX}px ${e.clientY}px, rgba(29, 78, 216, 0.04), transparent 80%)`; } 
            }); 
        }; 
        window.addEventListener('mousemove', handleMouseMove, { passive: true }); 
        return () => { window.removeEventListener('mousemove', handleMouseMove); cancelAnimationFrame(rafId); }; 
    }, []); 
    return <div ref={ref} className="fixed inset-0 z-0 pointer-events-none transition-opacity duration-300 will-change-transform" />; 
});

const BackgroundBlobs = memo(() => ( 
    <div className="fixed inset-0 overflow-hidden pointer-events-none z-[-1]"> 
        <div className="absolute top-0 -left-4 w-96 h-96 bg-purple-900/10 rounded-full mix-blend-screen filter blur-3xl opacity-40 animate-blob will-change-transform"></div> 
        <div className="absolute top-0 -right-4 w-96 h-96 bg-blue-900/10 rounded-full mix-blend-screen filter blur-3xl opacity-40 animate-blob animation-delay-2000 will-change-transform"></div> 
        <div className="absolute -bottom-8 left-20 w-96 h-96 bg-indigo-900/10 rounded-full mix-blend-screen filter blur-3xl opacity-40 animate-blob animation-delay-4000 will-change-transform"></div> 
    </div> 
));

const Reveal = ({ children, delay = 0, className = "" }) => { 
    const [isVisible, setIsVisible] = useState(false); 
    const ref = useRef(null); 
    useEffect(() => { 
        const observer = new IntersectionObserver(([entry]) => { 
            if (entry.isIntersecting) { setIsVisible(true); observer.unobserve(ref.current); } 
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }); 
        if (ref.current) observer.observe(ref.current); 
        return () => observer.disconnect(); 
    }, []); 
    return ( 
        <div ref={ref} className={`${className} transform transition-all duration-1000 ease-expo will-change-transform ${isVisible ? 'translate-y-0 opacity-100 scale-100 blur-0' : 'translate-y-8 opacity-0 scale-[0.98] blur-[2px]'}`} style={{ transitionDelay: `${delay}ms` }}> 
            {children} 
        </div> 
    ); 
};

const Breadcrumbs = ({ items }) => ( 
    <nav className="flex items-center flex-wrap gap-2 text-sm font-mono text-neutral-400 mb-8 animate-in fade-in slide-in-from-left-4 duration-700 ease-expo"> 
        {items.map((item, index) => ( 
            <React.Fragment key={index}> 
                {index > 0 && <Icons.ChevronRight size={14} className="text-neutral-600" />} 
                {item.onClick ? ( <button onClick={item.onClick} className="hover:text-white transition-colors cursor-pointer hover:underline underline-offset-4 decoration-neutral-600"> {item.label} </button> ) : ( <span className="text-neutral-200 cursor-default">{item.label}</span> )} 
            </React.Fragment> 
        ))}

);

const Footer = memo(() => (

));

const CircularScrollButton = ({ currentView }) => { 
    const [show, setShow] = useState(false); 
    useEffect(() => { 
        const handleScroll = () => { setShow(window.scrollY > 400 && currentView !== 'detail'); }; 
        window.addEventListener('scroll', handleScroll, { passive: true }); 
        return () => window.removeEventListener('scroll', handleScroll); 
    }, [currentView]);

    if (!show) return null; 
    return ( 
        <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} aria-label="Back to Top" className="fixed bottom-8 right-8 z-50 p-3.5 rounded-full bg-neutral-900/90 backdrop-blur-md border border-white/10 text-white hover:bg-neutral-800 transition-all duration-300 animate-in fade-in slide-in-from-bottom-6 shadow-2xl group hover:border-white/30"> 
            <div className="group-hover:-translate-y-1 transition-transform duration-300 ease-expo"><Icons.ArrowUp size={20} /></div> 
        </button> 
    ); 
};

const LocationTime = () => { 
    const [time, setTime] = useState(""); 
    useEffect(() => { 
        const updateTime = () => { 
            const now = new Date(); 
            const options = { timeZone: 'Asia/Dhaka', hour: '2-digit', minute: '2-digit', hour12: true }; 
            setTime(now.toLocaleTimeString('en-US', options)); 
        }; 
        updateTime(); 
        const interval = setInterval(updateTime, 1000); 
        return () => clearInterval(interval); 
    }, []);

    return ( 
        <div className="flex items-center gap-2.5 px-4 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur-md text-xs font-mono text-neutral-400 select-none hover:bg-white/10 transition-colors duration-300 cursor-default"> 
            <div className="animate-spin-slow" style={{ animationDuration: '10s' }}> 
                <Icons.Globe size={14} className="text-neutral-500" /> 
            </div> 
            <span>Global <span className="text-white font-medium ml-1">{time}</span></span> 
        </div>

};

// --- Navigation --- 
const Navigation = memo(({ currentView, isMenuOpen, setIsMenuOpen, onNavigate }) => { 
    const [activeSection, setActiveSection] = useState(""); 
    const [scrolled, setScrolled] = useState(false);

    useEffect(() => { 
        let throttleTimer; 
        const handleScroll = () => { 
            if (throttleTimer) return; 
            throttleTimer = setTimeout(() => { 
                setScrolled(window.scrollY > 20); 
                if (currentView === 'home') { 
                    const sections = ['work', 'services', 'playground', 'contact']; 
                    let current = ""; 
                    for (const section of sections) { 
                        const element = document.getElementById(section); 
                        if (element && window.scrollY >= (element.offsetTop - 300)) { current = section; } 
                    } 
                    setActiveSection(current ? `#${current}` : ""); 
                } 
                throttleTimer = null; 
            }, 50); 
        }; 
        window.addEventListener('scroll', handleScroll, { passive: true }); 
        return () => window.removeEventListener('scroll', handleScroll); 
    }, [currentView]);

    const menuItems = [ 
        { label: 'About', href: '#work' }, 
        { label: 'Services', href: '#services' }, 
        { label: 'Projects', href: 'playground', isPage: true }, 
        { label: 'Contact', href: '#contact' } 
    ];

    return ( 
        <React.Fragment> 
            <nav className={`fixed w-full z-50 top-0 left-0 transition-all duration-500 ease-expo ${scrolled ? 'py-4 bg-neutral-950/80 backdrop-blur-xl border-b border-white/5 shadow-2xl shadow-black/50' : 'py-6 bg-transparent'}`}> 
                <div className="px-6 md:px-12 max-w-7xl mx-auto flex justify-between items-center"> 
                    <a href="#" onClick={(e) => onNavigate(e, '#')} className="flex items-center gap-4 group z-50 relative" aria-label="Home"> 
                        <div className="relative w-10 h-10 bg-white rounded-lg flex items-center justify-center p-1.5 shadow-lg group-hover:scale-105 transition-transform duration-500 ease-expo"> 
                            <span className="font-bold text-black font-mono">AS</span>
                        </div> 
                        <span className={`font-mono text-sm tracking-widest uppercase transition-all duration-500 ease-expo hidden sm:block ${scrolled ? 'opacity-0 -translate-x-4 w-0 overflow-hidden' : 'opacity-100 translate-x-0 text-neutral-400'}`}>Ahmed Seyam</span> 
                    </a> 
                    <div className="hidden md:flex items-center gap-1 bg-neutral-900/80 p-1.5 rounded-full border border-white/10 backdrop-blur-md shadow-2xl"> 
                        {menuItems.map((item) => { 
                            const isActive = currentView === 'playground' ? item.isPage : activeSection === item.href; 
                            return ( 
                                <Magnetic key={item.label}> 
                                    <a href={item.href} onClick={(e) => onNavigate(e, item.href)} className={`px-5 py-2 rounded-full text-sm font-medium transition-all duration-300 relative inline-block ${isActive ? 'bg-white text-black shadow-lg scale-105' : 'text-neutral-400 hover:text-white hover:bg-white/5'}`}>{item.label}</a> 
                                </Magnetic> 
                            ); 
                        })} 
                    </div>

                    <div className="md:hidden z-50 relative"> 
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} aria-label="Toggle Menu" className="text-white p-2 relative group focus:outline-none"> 
                            <div className={`w-6 h-0.5 bg-white mb-1.5 transition-all duration-300 ease-expo ${isMenuOpen ? 'rotate-45 translate-y-2' : ''}`}></div> 
                            <div className={`w-6 h-0.5 bg-white mb-1.5 transition-all duration-300 ease-expo ${isMenuOpen ? 'opacity-0 translate-x-4' : ''}`}></div> 
                            <div className={`w-6 h-0.5 bg-white transition-all duration-300 ease-expo ${isMenuOpen ? '-rotate-45 -translate-y-2' : ''}`}></div>

            {isMenuOpen && ( 
                <div className="fixed inset-0 z-40 bg-neutral-950/98 backdrop-blur-3xl flex flex-col animate-in fade-in duration-500"> 
                    <div className="flex-1 flex flex-col justify-center items-center gap-8 p-6">

                            <a key={item.label} href={item.href} onClick={(e) => onNavigate(e, item.href)} className="text-5xl font-bold tracking-tighter text-neutral-300 hover:text-white transition-all hover:scale-105 duration-300 animate-slide-up opacity-0" style={{ animationDelay: `${idx * 100}ms` }}>{item.label}</a>

                </div> 
            )} 
        </React.Fragment> 
    ); 
});

const Preloader = ({ isLoading, onAnimationDone }) => { 
    const [progress, setProgress] = useState(0); 
    const [isExiting, setIsExiting] = useState(false); 
    const [message, setMessage] = useState("Initializing...");

    useEffect(() => { 
        let currentProgress = 0; 
        const interval = setInterval(() => { 
            const increment = Math.random() * 3 + 1; 
            currentProgress += increment; 
            if (currentProgress > 100) currentProgress = 100; 
            setProgress(Math.floor(currentProgress));

            if (currentProgress < 30) setMessage("Loading Assets..."); 
            else if (currentProgress < 55) setMessage("Compiling Code..."); 
            else if (currentProgress < 80) setMessage("Optimizing Experience..."); 
            else if (currentProgress < 100) setMessage("Almost Ready..."); 
            else setMessage("Welcome.");

            if (currentProgress >= 100) { 
                clearInterval(interval); 
                setTimeout(() => { setIsExiting(true); setTimeout(onAnimationDone, 900); }, 400); 
            } 
        }, 30); 
        return () => clearInterval(interval); 
    }, [onAnimationDone]);

    if (!isLoading && !isExiting) return null; 
    return ( 
        <div className={`fixed inset-0 z-[200] bg-neutral-950 flex flex-col items-center justify-center transition-transform duration-1000 ease-expo ${isExiting ? '-translate-y-full' : 'translate-y-0'}`}> 
            <div className="relative text-center w-full max-w-md px-6"> 
                <div className="text-7xl md:text-9xl font-bold text-white mb-2 font-mono tracking-tighter flex justify-center items-baseline"> 
                    {progress}<span className="text-3xl md:text-5xl text-neutral-500">%</span> 
                </div> 
                <div className="h-8 flex items-center justify-center mb-8"> 
                    <p className="text-neutral-400 font-mono text-sm uppercase tracking-[0.2em] animate-pulse">{message}</p> 
                </div>
                <div className="w-full h-[1px] bg-neutral-900 overflow-hidden relative"> 
                    <div className="absolute top-0 left-0 h-full bg-white transition-all duration-150 ease-out" style={{ width: `${progress}%` }}></div> 
                </div> 
            </div> 
        </div> 
    ); 
};

                    <Reveal delay={150}><p className="text-xl text-neutral-400 mb-12 max-w-md font-light">Currently open to senior developer opportunities and high-impact projects.</p></Reveal>

            <div className="mb-12"> 
                <h1 className="text-5xl md:text-7xl font-bold tracking-tighter mb-6">Projects</h1> 
                <p className="text-xl text-neutral-400 max-w-2xl font-light">A collection of full-stack builds, systems architectures, and production applications.</p>

                            <div className="absolute inset-0 flex items-center justify-center"><div className="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center scale-90 opacity-0 group-hover:scale-100 group-hover:opacity-100 transition-all duration-500 ease-expo shadow-xl"><Icons.ArrowUpRight size={22} /></div></div>

const ContactForm = ({ addToast }) => { 
    const [state, setState] = useState({ name: '', email: '', message: '', captcha: '' }); 
    const [loading, setLoading] = useState(false); 
    const [challenge, setChallenge] = useState({ n1: 0, n2: 0 }); 
    
    // ACTION REQUIRED: Add your own Formspree endpoint below
    const FORMSPREE_ENDPOINT = "https://formspree.io/f/YOUR_ENDPOINT_HERE"; 
    
    useEffect(() => { genCaptcha(); }, []); 
    const genCaptcha = () => setChallenge({ n1: Math.floor(Math.random()*10), n2: Math.floor(Math.random()*10) });

    const handleSubmit = async (e) => { 
        e.preventDefault(); 
        if (parseInt(state.captcha) !== (challenge.n1 + challenge.n2)) { 
            addToast("Incorrect math answer.", "error"); return; 
        } 
        setLoading(true); 
        try { 
            const response = await fetch(FORMSPREE_ENDPOINT, { 
                method: 'POST', 
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ name: state.name, email: state.email, message: state.message }) 
            }); 
            if (response.ok) { 
                setState({ name: '', email: '', message: '', captcha: '' }); 
                genCaptcha(); 
                addToast("Message sent successfully!", "success"); 
            } else { 
                addToast("Error: Did you replace the Formspree ID?", "error"); 
            } 
        } catch (error) { 
            addToast("Network error. Please try again.", "error"); 
        } finally { 
            setLoading(false); 
        } 
    };

    return ( 
        <form onSubmit={handleSubmit} className="space-y-4 bg-neutral-950/50 p-8 rounded-3xl border border-white/5 shadow-2xl"> 
            <div className="grid grid-cols-2 gap-4"> 
                <input type="text" placeholder="Name" required className="w-full bg-neutral-900/50 border border-white/10 rounded-xl p-4 text-white placeholder:text-neutral-500 focus:border-white/50 focus:bg-neutral-900 focus:outline-none transition-all duration-300" value={state.name} onChange={e => setState({...state, name: e.target.value})} /> 
                <input type="email" placeholder="Email" required className="w-full bg-neutral-900/50 border border-white/10 rounded-xl p-4 text-white placeholder:text-neutral-500 focus:border-white/50 focus:bg-neutral-900 focus:outline-none transition-all duration-300" value={state.email} onChange={e => setState({...state, email: e.target.value})} /> 
            </div> 
            <textarea placeholder="Tell me about your project..." rows="5" required className="w-full bg-neutral-900/50 border border-white/10 rounded-xl p-4 text-white placeholder:text-neutral-500 focus:border-white/50 focus:bg-neutral-900 focus:outline-none transition-all duration-300 resize-none" value={state.message} onChange={e => setState({...state, message: e.target.value})}></textarea> 
            <div className="flex gap-4 items-center"> 
                <div className="flex-1 bg-neutral-900/50 border border-white/10 rounded-xl px-4 py-4 text-neutral-400 font-mono text-sm flex items-center justify-between"> 
                    <span>{challenge.n1} + {challenge.n2} = ?</span> 
                    <button type="button" onClick={genCaptcha} className="hover:text-white hover:rotate-180 transition-all duration-300"><Icons.RefreshCcw size={16}/></button> 
                </div> 
                <input type="number" placeholder="Ans" required className="w-24 bg-neutral-900/50 border border-white/10 rounded-xl p-4 text-white text-center focus:border-white/50 focus:bg-neutral-900 focus:outline-none transition-all duration-300" value={state.captcha} onChange={e => setState({...state, captcha: e.target.value})} /> 
                <button type="submit" disabled={loading} className="flex-1 bg-white text-black font-bold rounded-xl p-4 hover:bg-neutral-200 hover:scale-[1.02] transition-all duration-300 disabled:opacity-50 disabled:hover:scale-100 flex justify-center items-center gap-2 group"> 
                    {loading ? 'Sending...' : <React.Fragment>Send Message <span className="group-hover:translate-x-1 transition-transform"><Icons.Send size={16}/></span></React.Fragment>} 
                </button> 
            </div> 
        </form> 
    ); 
};

const App = () => { 
    const [isLoading, setIsLoading] = useState(true); 
    const [isMenuOpen, setIsMenuOpen] = useState(false); 
    const [currentView, setCurrentView] = useState('home'); 
    const [selectedProject, setSelectedProject] = useState(null); 
    const [toasts, setToasts] = useState([]); 
    const scrollPos = useRef(0);

    useEffect(() => { 
        if (isMenuOpen) document.body.style.overflow = 'hidden'; 
        else document.body.style.overflow = ''; 
    }, [isMenuOpen]);

    const addToast = useCallback((msg, type) => { 
        const id = Date.now(); 
        setToasts(prev => [...prev, { id, message: msg, type }]); 
    }, []);

    const handleNav = useCallback((e, href) => { 
        e.preventDefault(); 
        setIsMenuOpen(false);

        if (href === 'playground') { 
            scrollPos.current = window.scrollY; 
            setCurrentView('playground'); 
            return; 
        }

        const performScroll = () => { 
            if (href === '#' || !href) { 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            } else { 
                const el = document.querySelector(href); 
                if (el) el.scrollIntoView({ behavior: 'smooth' }); 
            } 
        };

        if (currentView !== 'home') { 
            setCurrentView('home'); 
            setTimeout(performScroll, 50); 
        } else { 
            performScroll(); 
        } 
    }, [currentView]);

    const handleProjectClick = useCallback((item, type) => { 
        scrollPos.current = window.scrollY; 
        if (type === 'page') { setCurrentView('playground'); return; } 
        const project = { ...item }; 
        if (type === 'work') { 
            project.title = item.role; 
            project.subtitle = item.company; 
            project.category = "Work Experience"; 
            project.color = "bg-neutral-800"; 
        } else { 
            project.subtitle = item.type; 
            project.category = "Projects"; 
        } 
        setSelectedProject(project); 
        setCurrentView('detail'); 
    }, []);

    const goBack = useCallback((target) => { 
        setCurrentView('home'); 
        setSelectedProject(null); 
        if (typeof target === 'string' && target.startsWith('#')) { 
            setTimeout(() => { document.querySelector(target)?.scrollIntoView({ behavior: 'smooth' }); }, 50); 
        } else { 
            setTimeout(() => window.scrollTo(0, scrollPos.current), 50); 
        } 
    }, []);

    return ( 
        <div className="min-h-screen bg-[#050505] text-white selection:bg-indigo-500 selection:text-white overflow-x-hidden font-sans"> 
            <div className="bg-mesh"></div> 
            <Spotlight /> 
            <BackgroundBlobs /> 
            <CustomCursor /> 
            <Preloader isLoading={isLoading} onAnimationDone={() => setIsLoading(false)} /> 
            <div className="fixed bottom-6 right-6 z-[60] flex flex-col gap-3 pointer-events-none"> 
                {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={() => setToasts(prev => prev.filter(i => i.id !== t.id))} />)} 
            </div> 
            <Navigation currentView={currentView} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} onNavigate={handleNav} /> 
            <CircularScrollButton currentView={currentView} /> 
            
            <main className="relative z-10 w-full"> 
                {currentView === 'home' && <HomePage onProjectClick={handleProjectClick} addToast={addToast} />} 
                {currentView === 'playground' && <PlaygroundPage onBack={goBack} onItemClick={(item) => handleProjectClick(item, 'playground')} />} 
                {currentView === 'detail' && selectedProject && <ProjectDetailPage project={selectedProject} onBack={goBack} onHome={goBack} />} 
            </main> 
        </div> 
    ); 
};

const root = ReactDOM.createRoot(document.getElementById('root')); 
window.addEventListener('load', () => { root.render(<App />); }); 
</script>
